databaseChangeLog:
  - changeSet:
      id: 5-make-username-nullable
      author: system-revamp
      changes:
        - dropNotNullConstraint:
            tableName: users
            columnName: username
            columnDataType: varchar(255)
  - changeSet:
      id: 6-create-countries-table
      author: system-revamp
      changes:
        - createTable:
            tableName: countries
            columns:
              - column:
                  name: id
                  type: int
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: visiable
                  type: boolean
                  constraints:
                    nullable: false
  - changeSet:
      id: 7-insert-legacy-countries
      author: system-revamp
      changes:
        - insert: { tableName: countries, columns: [ { column: { name: id, valueNumeric: 1 } }, { column: { name: name, value: 'Egypt' } }, { column: { name: visiable, valueBoolean: true } } ] }
        - insert: { tableName: countries, columns: [ { column: { name: id, valueNumeric: 2 } }, { column: { name: name, value: 'Emirates' } }, { column: { name: visiable, valueBoolean: true } } ] }
        - insert: { tableName: countries, columns: [ { column: { name: id, valueNumeric: 3 } }, { column: { name: name, value: 'Saudi Arabia' } }, { column: { name: visiable, valueBoolean: true } } ] }
